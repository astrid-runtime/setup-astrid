name: "Setup Astrid"
description: "Install the Astrid CLI (astrid, astrid-daemon, astrid-build, astrid-emit) into a CI runner, with sigstore provenance / SHA256 verification."
author: "Astrid contributors"
branding:
  icon: "box"
  color: "purple"

inputs:
  version:
    description: "Astrid version to install (e.g. '0.9.2'), or 'latest'."
    required: false
    default: "latest"
  repository:
    description: "GitHub owner/repo to install the release from (override for a fork or a mirror)."
    required: false
    default: "astrid-runtime/astrid"
  verify:
    description: >-
      Artifact verification mode: 'sigstore' (cosign — verifies the release's
      keyless signature over SHA256SUMS.txt, then checks the binary against it:
      provenance + integrity), 'checksum' (SHA256 integrity only, no extra
      tooling), or 'none' (not recommended).
    required: false
    default: "sigstore"
  certificate-identity:
    description: >-
      Override the expected cosign certificate identity (advanced). Defaults to
      the release.yml workflow of <repository> at the version tag.
    required: false
    default: ""
  github-token:
    description: "Token used for the GitHub API release lookup and asset downloads."
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: "The resolved Astrid version that was installed."
    value: ${{ steps.resolve.outputs.version }}
  bindir:
    description: "The directory added to PATH containing the Astrid binaries."
    value: ${{ steps.install.outputs.bindir }}

runs:
  using: "composite"
  steps:
    - id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_REPO: ${{ inputs.repository }}
      run: |
        set -euo pipefail
        # Runner platform -> release target triple. Astrid ships macOS and Linux
        # binaries only; anything else is a hard, clear error.
        case "${RUNNER_OS}/${RUNNER_ARCH}" in
          Linux/X64)   target="x86_64-unknown-linux-gnu" ;;
          Linux/ARM64) target="aarch64-unknown-linux-gnu" ;;
          macOS/X64)   target="x86_64-apple-darwin" ;;
          macOS/ARM64) target="aarch64-apple-darwin" ;;
          *)
            echo "::error::setup-astrid: unsupported runner ${RUNNER_OS}/${RUNNER_ARCH} — Astrid ships macOS and Linux binaries only."
            exit 1
            ;;
        esac

        # Resolve the version: 'latest' -> the latest release tag, else the given
        # version (with or without a leading 'v').
        if [ "${INPUT_VERSION}" = "latest" ]; then
          tag="$(gh api "repos/${INPUT_REPO}/releases/latest" --jq '.tag_name')"
        else
          tag="v${INPUT_VERSION#v}"
        fi
        version="${tag#v}"

        {
          echo "version=${version}"
          echo "tag=${tag}"
          echo "target=${target}"
          echo "asset=astrid-${version}-${target}.tar.gz"
        } >> "$GITHUB_OUTPUT"
        echo "setup-astrid: resolved astrid ${version} (${target})"

    - id: download
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
        TAG: ${{ steps.resolve.outputs.tag }}
        ASSET: ${{ steps.resolve.outputs.asset }}
        VERIFY: ${{ inputs.verify }}
      run: |
        set -euo pipefail
        dir="${RUNNER_TEMP}/setup-astrid"
        rm -rf "${dir}"
        mkdir -p "${dir}"
        cd "${dir}"
        base="https://github.com/${REPO}/releases/download/${TAG}"
        curl --fail --silent --show-error --location -o "${ASSET}" "${base}/${ASSET}"
        curl --fail --silent --show-error --location -o "SHA256SUMS.txt" "${base}/SHA256SUMS.txt"
        if [ "${VERIFY}" = "sigstore" ]; then
          curl --fail --silent --show-error --location \
            -o "SHA256SUMS.txt.sigstore.json" "${base}/SHA256SUMS.txt.sigstore.json"
        fi
        echo "dir=${dir}" >> "$GITHUB_OUTPUT"

    - name: Install cosign
      if: inputs.verify == 'sigstore'
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Verify artifacts
      shell: bash
      env:
        VERIFY: ${{ inputs.verify }}
        DIR: ${{ steps.download.outputs.dir }}
        ASSET: ${{ steps.resolve.outputs.asset }}
        REPO: ${{ inputs.repository }}
        TAG: ${{ steps.resolve.outputs.tag }}
        CERT_ID_OVERRIDE: ${{ inputs.certificate-identity }}
      run: |
        set -euo pipefail
        cd "${DIR}"

        # SHA256 of the archive vs the recorded sum. Integrity — catches a
        # corrupted, truncated, or on-the-wire-altered download.
        verify_checksum() {
          local expected actual
          expected="$(awk -v a="${ASSET}" '$2 == a { print $1 }' SHA256SUMS.txt)"
          if [ -z "${expected}" ]; then
            echo "::error::setup-astrid: no checksum for ${ASSET} in SHA256SUMS.txt"
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "${ASSET}" | awk '{ print $1 }')"
          else
            actual="$(shasum -a 256 "${ASSET}" | awk '{ print $1 }')"
          fi
          if [ "${expected}" != "${actual}" ]; then
            echo "::error::setup-astrid: checksum mismatch for ${ASSET} (expected ${expected}, got ${actual})"
            exit 1
          fi
          echo "setup-astrid: SHA256 verified for ${ASSET}"
        }

        case "${VERIFY}" in
          sigstore)
            identity="${CERT_ID_OVERRIDE}"
            if [ -z "${identity}" ]; then
              identity="https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/${TAG}"
            fi
            # Authenticity: the checksums file carries a keyless signature bound
            # to the release workflow's GitHub OIDC identity. Verify that, then
            # check the archive against the now-trusted checksums.
            verify_identity() {
              local expected="$1"
              echo "setup-astrid: verifying SHA256SUMS.txt provenance via cosign (identity: ${expected})"
              cosign verify-blob \
                --bundle "SHA256SUMS.txt.sigstore.json" \
                --certificate-identity "${expected}" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "SHA256SUMS.txt"
            }

            if ! verify_identity "${identity}"; then
              # Releases made before the organization transfer retain their
              # original GitHub OIDC workflow identity. Only the new canonical
              # repository gets this narrow fallback; forks and explicit
              # overrides must match exactly as requested.
              if [ -n "${CERT_ID_OVERRIDE}" ] || [ "${REPO}" != "astrid-runtime/astrid" ]; then
                exit 1
              fi
              legacy_identity="https://github.com/unicity-astrid/astrid/.github/workflows/release.yml@refs/tags/${TAG}"
              echo "setup-astrid: retrying historical Astrid release identity"
              verify_identity "${legacy_identity}"
            fi
            verify_checksum
            ;;
          checksum)
            verify_checksum
            ;;
          none)
            echo "::warning::setup-astrid: artifact verification is disabled (verify: none)"
            ;;
          *)
            echo "::error::setup-astrid: invalid verify mode '${VERIFY}' (expected sigstore | checksum | none)"
            exit 1
            ;;
        esac

    - id: install
      shell: bash
      env:
        DIR: ${{ steps.download.outputs.dir }}
        ASSET: ${{ steps.resolve.outputs.asset }}
        VERSION: ${{ steps.resolve.outputs.version }}
        TARGET: ${{ steps.resolve.outputs.target }}
      run: |
        set -euo pipefail
        cd "${DIR}"
        tar -xzf "${ASSET}"
        bindir="${DIR}/astrid-${VERSION}-${TARGET}"
        if [ ! -f "${bindir}/astrid" ]; then
          echo "::error::setup-astrid: extracted archive is missing the astrid binary at ${bindir}"
          exit 1
        fi
        chmod +x "${bindir}/astrid" "${bindir}/astrid-daemon" \
                 "${bindir}/astrid-build" "${bindir}/astrid-emit" 2>/dev/null || true
        # Later steps in the job pick this up from PATH.
        echo "${bindir}" >> "$GITHUB_PATH"
        echo "bindir=${bindir}" >> "$GITHUB_OUTPUT"
        echo "setup-astrid: added ${bindir} to PATH"

    - name: Verify installation
      shell: bash
      env:
        BINDIR: ${{ steps.install.outputs.bindir }}
      run: |
        set -euo pipefail
        # Invoke by absolute path — a PATH entry written to $GITHUB_PATH only
        # takes effect in *subsequent* steps, not the one that wrote it.
        "${BINDIR}/astrid" --version
        echo "setup-astrid: astrid is on PATH for subsequent steps"
